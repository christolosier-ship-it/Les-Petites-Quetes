name: Avatar diagnostics

on:
  push:
    branches:
      - fix/materialize-avatar-files

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/materialize-avatar-files
      - name: Collect diagnostics
        run: |
          {
            echo "Avatar files:"
            find public/avatars -maxdepth 1 -type f -printf '%f %s bytes\n' | sort
            echo
            echo "check-assets output:"
            node scripts/check-assets.mjs
          } > avatar-diagnostics.txt 2>&1 || true
      - name: Commit diagnostics
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add avatar-diagnostics.txt
          git commit -m "chore: collect avatar diagnostics" || exit 0
          git push
