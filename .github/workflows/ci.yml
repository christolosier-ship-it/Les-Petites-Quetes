name: Qualité V1

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  typing:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Installer les dépendances
        run: npm install --silent --no-audit --no-fund
      - name: Capturer le typage strict
        id: typecheck
        continue-on-error: true
        run: npm run typecheck > typecheck.log 2>&1
      - name: Publier le diagnostic TypeScript
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-multi-universe
          path: typecheck.log
      - name: Valider le typage strict
        if: steps.typecheck.outcome == 'failure'
        run: exit 1

  coverage:
    needs: typing
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
        with:
          show-progress: false
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Installer les dépendances
        run: npm install --silent --no-audit --no-fund
      - name: Vérifier la couverture
        run: npm run test:coverage

  quality:
    needs: [typing, coverage]
    runs-on: ubuntu-latest
    timeout-minutes: 18
    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Installer Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
      - name: Installer les dépendances
        run: npm install --no-audit --no-fund
      - name: Vérifier les frontières d’architecture
        run: npm run check:architecture
      - name: Vérifier les cycles
        run: npm run check:cycles
      - name: Vérifier les budgets de fichiers
        run: npm run check:files
      - name: Vérifier les assets
        run: npm run check:assets
      - name: Vérifier les contenus multi-univers
        run: npm run check:content
      - name: Lint scripts et configuration
        run: npx eslint scripts eslint.config.js vite.config.ts
      - name: Lint domaine
        run: npx eslint src/domain
      - name: Lint modèles et ports applicatifs
        run: npx eslint src/application/model src/application/ports
      - name: Lint commandes de préparation
        run: npx eslint src/application/services/familySetupCommands.ts src/application/services/familySetupCommands.test.ts
      - name: Lint flux et actualisation
        run: npx eslint src/application/services/questFlowCommands.ts src/application/services/questFlowCommands.test.ts src/application/services/stateRefresh.ts
      - name: Lint file de mutations
        run: npx eslint src/application/services/StateCommitQueue.ts src/application/services/StateCommitQueue.test.ts
      - name: Lint contrôleur
        run: npx eslint src/app/controller
      - name: Lint shell et état
        run: npx eslint src/app/App.tsx src/app/App.test.tsx src/app/state
      - name: Lint persistance
        run: npx eslint src/persistence
      - name: Lint plateforme navigateur
        run: npx eslint src/platform
      - name: Lint interface contenus et fixtures
        run: npx eslint src/features src/pages src/components src/content src/assets src/tests src/main.tsx
      - name: Exécuter les tests unitaires
        run: npm run test
      - name: Construire l’application
        run: npm run build
      - name: Vérifier l’artefact Pages
        run: npm run check:pages
      - name: Exécuter le smoke test Chrome multi-univers
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run check:browser
