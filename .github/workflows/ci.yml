name: Qualité V1

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Installer les dépendances
        run: npm install --no-audit --no-fund

      - name: Vérifier les frontières d’architecture
        run: npm run check:architecture

      - name: Vérifier les cycles
        run: npm run check:cycles

      - name: Vérifier les budgets de fichiers
        run: npm run check:files

      - name: Vérifier les assets
        run: npm run check:assets

      - name: Vérifier les contenus
        run: npm run check:content

      - name: Exécuter le lint
        run: npm run lint

      - name: Vérifier le typage
        run: npm run typecheck

      - name: Tester les dates locales
        run: npx vitest run src/domain/shared/localDate.test.ts

      - name: Tester les planifications
        run: npx vitest run src/domain/schedule/QuestSchedule.test.ts

      - name: Tester la génération des occurrences
        run: npx vitest run src/domain/schedule/OccurrenceGeneration.test.ts

      - name: Exécuter les tests unitaires
        run: npm run test

      - name: Vérifier la couverture
        run: npm run test:coverage

      - name: Construire l’application
        run: npm run build

      - name: Vérifier l’artefact Pages
        run: npm run check:pages

      - name: Exécuter le smoke test Chrome
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run check:browser
