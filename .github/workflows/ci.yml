name: Qualité V1

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Contrôles complets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Installer les dépendances
        run: npm install --no-audit --no-fund

      - name: Capturer le contrôle d’architecture
        id: architecture
        continue-on-error: true
        run: npm run check:architecture > architecture.log 2>&1

      - name: Publier le diagnostic d’architecture
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: architecture-diagnostic
          path: architecture.log

      - name: Valider l’architecture
        if: steps.architecture.outcome == 'failure'
        run: exit 1

      - name: Vérifier les cycles
        run: npm run check:cycles

      - name: Vérifier les budgets, assets et contenus
        run: npm run check:files && npm run check:assets && npm run check:content

      - name: Vérifier le lint et le typage
        run: npm run lint && npm run typecheck

      - name: Exécuter les tests avec couverture
        run: npm run test:coverage

      - name: Construire et contrôler l’artefact Pages
        run: npm run build

      - name: Exécuter le smoke test Chrome
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run check:browser
