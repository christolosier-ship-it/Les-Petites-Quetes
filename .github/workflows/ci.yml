name: Qualité V1

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installer Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1

      - name: Installer les dépendances
        run: npm install --no-audit --no-fund

      - name: Vérifier les frontières d’architecture
        run: npm run check:architecture

      - name: Vérifier les cycles
        run: npm run check:cycles

      - name: Vérifier les budgets de fichiers
        run: npm run check:files

      - name: Vérifier les assets
        run: npm run check:assets

      - name: Vérifier les contenus
        run: npm run check:content

      - name: Lint scripts et configuration
        run: npx eslint scripts eslint.config.js vite.config.ts

      - name: Lint domaine
        run: npx eslint src/domain

      - name: Lint modèles et ports applicatifs
        run: npx eslint src/application/model src/application/ports

      - name: Lint commandes de préparation
        run: npx eslint src/application/services/familySetupCommands.ts

      - name: Lint flux et actualisation
        run: npx eslint src/application/services/questFlowCommands.ts src/application/services/stateRefresh.ts

      - name: Lint file de mutations
        run: npx eslint src/application/services/StateCommitQueue.ts

      - name: Lint test de concurrence
        run: npx eslint src/application/services/StateCommitQueue.test.ts

      - name: Lint contrôleur et état
        run: npx eslint src/app

      - name: Lint persistance et plateforme
        run: npx eslint src/persistence src/platform

      - name: Lint interface et contenus
        run: npx eslint src/features src/pages src/components src/content src/assets src/main.tsx

      - name: Vérifier le typage
        run: npm run typecheck

      - name: Exécuter les tests unitaires
        run: npm run test

      - name: Vérifier la couverture
        run: npm run test:coverage

      - name: Construire l’application
        run: npm run build

      - name: Vérifier l’artefact Pages
        run: npm run check:pages

      - name: Exécuter le smoke test Chrome
        env:
          CHROME_BIN: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: npm run check:browser
